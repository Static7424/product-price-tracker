name: Publish

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  ghcr:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          owner: ${{ github.repository_owner }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
      
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ steps.app-token.outputs.token }}

      - name: Login to GHCR
        run: echo "${{ steps.app-token.outputs.token }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Extract Version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build Image
        run: |
          docker build \
            -t ${{ steps.image.outputs.name }}:${{ steps.version.outputs.version }} \
            -t ${{ steps.image.outputs.name }}:latest \
            .

      - name: Push Image
        run: |
          docker push ${{ steps.image.outputs.name }}:${{ steps.version.outputs.version }}
          docker push ${{ steps.image.outputs.name }}:latest