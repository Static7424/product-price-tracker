name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      POSTGRES_VERSION: "17"
      POSTGRES_PORT: "5432"
      POSTGRES_DATABASE: "pricetracker"
      POSTGRES_USER: "user"
      POSTGRES_PASSWORD: "password"
      POSTGRES_URL: "localhost:5432"
    services:
      postgres:
        image: postgres:${{ env.POSTGRES_VERSION }}-alpine
        env:
          POSTGRES_DB: ${{ env.POSTGRES_DATABASE }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        ports:
          - "${{ env.POSTGRES_PORT }}:5432"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -U ${{ env.POSTGRES_USER }} -d ${{ env.POSTGRES_DATABASE }} && break
            sleep 1
          done

      - name: Initialize Database
        run: PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql -h localhost -U ${{ env.POSTGRES_USER }} -d ${{ env.POSTGRES_DATABASE }} -f database/init_db.sql

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.1"

      - name: Lint (Ruff)
        run: uv run ruff check .

      - name: Format Check
        run: uv run ruff format --check .

      - name: Run Tests
        run: uv run pytest

      - name: Upload Test Coverage
        uses: codecov/codecov-action@v4

      - name: Security Scan (Bandit)
        run: uv run bandit -r src/

      - name: Dependency Vulnerability Check
        run: uv run pip-audit
  
  docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Docker Build Verification
        run: docker build .
